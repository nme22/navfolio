name: CI

on:
   push:
      branches: [main]
   pull_request:

jobs:
   verify:
      runs-on: ubuntu-latest
      steps:
         - uses: actions/checkout@v5

         - uses: actions/setup-node@v5
           with:
              node-version: 22
              cache: npm

         - name: Install dependencies
           run: npm ci

         - name: Type check
           run: npm run typecheck

         - name: Lint
           run: npm run lint

         - name: Format check
           run: npm run format:check

         - name: Build
           run: npm run build
